<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <script>
      (function initializeMotionPreference() {
        var reduceMotion = false;
        try {
          reduceMotion = localStorage.getItem('pinry.motion.reduce') === 'true';
        } catch (error) {
          reduceMotion = false;
        }
        document.documentElement.setAttribute('data-motion', reduceMotion ? 'reduce' : 'full');
      }());
    </script>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
    <meta name="description" content="HyEISN Gallery is a personal visual archive for collected images, comics, and inspiration.">
    <meta name="application-name" content="HyEISN Gallery">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="color-scheme" content="light dark">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="HyEISN Gallery">
    <meta property="og:title" content="HyEISN Gallery">
    <meta property="og:description" content="A personal visual archive for collected images, comics, and inspiration.">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="HyEISN Gallery">
    <meta name="twitter:description" content="A personal visual archive for collected images, comics, and inspiration.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@2.5.94/css/materialdesignicons.min.css">
    <title>HyEISN Gallery</title>
  </head>
