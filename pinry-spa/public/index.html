<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <script>
      (function initializeMotionPreference() {
        var reduceMotion = false;
        try {
          reduceMotion = localStorage.getItem('pinry.motion.reduce') === 'true';
        } catch (error) {
          reduceMotion = false;
        }
        document.documentElement.setAttribute('data-motion', reduceMotion ? 'reduce' : 'full');
      }());
    </script>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@2.5.94/css/materialdesignicons.min.css">
    <link rel="icon" href="<%= BASE_URL %>favicon.png">
    <title>hyeisn-Pinry</title>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but Pinry doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
